services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: ["streamlit", "run", "sentiment_analysis/dashboard/app.py", "--server.address", "0.0.0.0"]
    depends_on:
      api:
        condition: service_healthy
